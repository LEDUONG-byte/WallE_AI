<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Wall-E Vision Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fdf8f6;
            min-height: 100vh;
            margin: 0;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
        }

        .motor-btn {
            transition: all 0.2s;
            cursor: pointer;
            user-select: none;
        }

        .motor-btn:active {
            transform: scale(0.9);
            background-color: #f97316;
            color: white;
            border-color: #f97316;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: #f1f5f9;
            border-radius: 10px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #f97316;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -6px;
        }
        
        /* Video Container */
        .video-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
            background: #000;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="w-full max-w-6xl mx-auto space-y-6">
        
        <!-- HEADER -->
        <header class="flex items-center justify-between px-4">
            <div>
                <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Wall-E <span class="text-orange-500">Vision</span></h1>
                <div class="flex items-center gap-2 mt-1">
                    <span id="status-dot" class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                    <span id="status-text" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Offline</span>
                </div>
            </div>
            <div id="connection-ip" class="flex items-center px-3 py-1 bg-white rounded-full border border-gray-100 text-[10px] font-bold text-gray-400 uppercase">
                Radar: Scanning...
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- VIDEO FEED SECTION -->
            <div class="lg:col-span-7 glass-card p-4 flex flex-col min-h-[400px]">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-gray-800 uppercase text-xs tracking-widest flex items-center gap-2">
                        <i data-lucide="eye" class="w-4 h-4 text-orange-500"></i> Live View (DroidCam)
                    </h2>
                    <span id="cam-status" class="text-[10px] font-bold text-gray-400 uppercase">No Camera Found</span>
                </div>
                <div class="flex-1 rounded-2xl overflow-hidden bg-gray-100 relative">
                    <img id="video-stream" src="" class="video-feed hidden" alt="Video Feed">
                    <div id="video-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-gray-300">
                        <i data-lucide="camera-off" class="w-12 h-12 mb-2"></i>
                        <span class="text-xs font-medium">Chưa tìm thấy thiết bị DroidCam</span>
                    </div>
                </div>
            </div>

            <!-- MOVEMENT CONTROLS -->
            <div class="lg:col-span-5 glass-card p-8 flex flex-col items-center justify-center">
                <div class="w-full flex justify-between items-center mb-8">
                    <h2 class="font-bold text-gray-800 uppercase text-xs tracking-widest">Movement</h2>
                    <i data-lucide="navigation" class="w-4 h-4 text-gray-300"></i>
                </div>
                
                <div class="grid grid-cols-3 gap-4 select-none">
                    <div></div>
                    <button onmousedown="send('M:1:200');send('M:2:200')" onmouseup="stop()" ontouchstart="send('M:1:200');send('M:2:200')" ontouchend="stop()"
                            class="motor-btn w-16 h-16 md:w-20 md:h-20 bg-white rounded-3xl flex items-center justify-center border border-gray-100">
                        <i data-lucide="chevron-up" class="w-8 h-8"></i>
                    </button>
                    <div></div>
                    
                    <button onmousedown="send('M:1:-200');send('M:2:200')" onmouseup="stop()" ontouchstart="send('M:1:-200');send('M:2:200')" ontouchend="stop()"
                            class="motor-btn w-16 h-16 md:w-20 md:h-20 bg-white rounded-3xl flex items-center justify-center border border-gray-100">
                        <i data-lucide="rotate-ccw" class="w-7 h-7"></i>
                    </button>
                    <button onmousedown="stop()" ontouchstart="stop()"
                            class="motor-btn w-16 h-16 md:w-20 md:h-20 bg-orange-50 rounded-3xl flex items-center justify-center border border-orange-100 text-orange-500">
                        <i data-lucide="octagon" class="w-8 h-8"></i>
                    </button>
                    <button onmousedown="send('M:1:200');send('M:2:-200')" onmouseup="stop()" ontouchstart="send('M:1:200');send('M:2:-200')" ontouchend="stop()"
                            class="motor-btn w-16 h-16 md:w-20 md:h-20 bg-white rounded-3xl flex items-center justify-center border border-gray-100">
                        <i data-lucide="rotate-cw" class="w-7 h-7"></i>
                    </button>
                    
                    <div></div>
                    <button onmousedown="send('M:1:-200');send('M:2:-200')" onmouseup="stop()" ontouchstart="send('M:1:-200');send('M:2:-200')" ontouchend="stop()"
                            class="motor-btn w-16 h-16 md:w-20 md:h-20 bg-white rounded-3xl flex items-center justify-center border border-gray-100">
                        <i data-lucide="chevron-down" class="w-8 h-8"></i>
                    </button>
                    <div></div>
                </div>
            </div>

            <!-- SERVO SYSTEMS (6 CHANNELS) -->
            <div class="lg:col-span-12 glass-card p-8">
                <div class="w-full flex justify-between items-center mb-8">
                    <h2 class="font-bold text-gray-800 uppercase text-xs tracking-widest">Servo Systems</h2>
                    <i data-lucide="sliders" class="w-4 h-4 text-gray-300"></i>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <script>
                        for(let i=0; i<=5; i++) {
                            document.write(`
                                <div class="space-y-2">
                                    <div class="flex justify-between items-center px-1">
                                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-tight">Channel ${i}</span>
                                        <span id="label${i}" class="text-xs font-black text-orange-500">90°</span>
                                    </div>
                                    <input type="range" min="0" max="180" value="90" oninput="updateS(${i}, this.value)">
                                </div>
                            `);
                        }
                    </script>
                </div>
            </div>
        </div>

        <div id="log-container" class="px-6 py-3 bg-white/50 rounded-2xl border border-white flex gap-4 text-[10px] font-medium text-gray-400 overflow-x-auto">
            <span>System Ready... Scanning for ESP and DroidCam on network...</span>
        </div>
    </div>

    <script>
        let ws;
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const logContainer = document.getElementById('log-container');
        const videoStream = document.getElementById('video-stream');
        const videoPlaceholder = document.getElementById('video-placeholder');
        const camStatus = document.getElementById('cam-status');

        function addLog(msg, color='text-gray-600') {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            logContainer.innerHTML = `<span class="text-orange-500">[${time}]</span> <span class="${color}">${msg}</span>`;
        }

        function connect() {
            const host = window.location.hostname || 'localhost';
            try {
                ws = new WebSocket(`ws://${host}:8765`);
                ws.onopen = () => {
                    statusDot.className = 'w-2 h-2 rounded-full bg-green-500';
                    statusText.innerText = 'Online';
                    statusText.className = 'text-[10px] font-bold text-green-600 uppercase tracking-widest';
                    addLog('WebSocket Bridge connected', 'text-green-600');
                };
                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    if (data.type === 'droidcam') {
                        setupVideo(data.ip);
                    }
                };
                ws.onclose = () => {
                    statusDot.className = 'w-2 h-2 rounded-full bg-red-500 animate-pulse';
                    statusText.innerText = 'Offline';
                    addLog('WebSocket connection lost', 'text-red-500');
                    setTimeout(connect, 2000);
                };
            } catch (e) {
                setTimeout(connect, 2000);
            }
        }

        function setupVideo(ip) {
            const url = `http://${ip}:4747/video`;
            videoStream.src = url;
            videoStream.classList.remove('hidden');
            videoPlaceholder.classList.add('hidden');
            camStatus.innerText = `Camera Found: ${ip}`;
            camStatus.classList.replace('text-gray-400', 'text-green-500');
            addLog(`DroidCam linked: ${url}`, 'text-blue-600');
        }

        function send(cmd) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(cmd); }
        function stop() { send('M:1:0'); send('M:2:0'); }
        function updateS(id, val) {
            document.getElementById('label'+id).innerText = val + '°';
            send(`S:${id}:${val}`);
        }

        lucide.createIcons();
        window.onload = connect;
    </script>
</body>
</html>
